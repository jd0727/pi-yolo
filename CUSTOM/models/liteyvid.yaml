# YOLOv5s 🚀 by Ultralytics, GPL-3.0 license

# Parameters
nc: 20  # number of classes

scales: # model compound scaling constants, i.e. 'model=yolov5n.yaml' will call yolov5.yaml with scale 'n'
  # [depth, width, max_channels]
  n: [0.33, 0.25, 1024]
  s: [ 0.33, 0.50, 1024 ]
  m: [ 0.67, 0.75, 1024 ]
#  l: [1.00, 1.00, 1024]
#  x: [1.33, 1.25, 1024]
#
# YOLOv5s v6.0 backbone
backbone:
  # [from, number, module, args]
  [ [ -1, 1, Conv, [ 64, 6, 2, 2 ] ],  # 0-P1/2
    [ -1, 1, GhostConv, [ 128, 3, 2 ] ],  # 1-P2/4
    [ -1, 1, ECA, [ 128 ] ],
    [ -1, 3, C2fGhost, [ 128 ] ],
    [ -1, 1, GhostConv, [ 256, 3, 2 ] ],  # 3-P3/8
    [ -1, 1, ECA, [ 256 ] ],
    [ -1, 6, C2fGhost, [ 256 ] ],
    [ -1, 1, GhostConv, [ 512, 3, 2 ] ],  # 5-P4/16
    [ -1, 1, ECA, [ 512 ] ],
    [ -1, 9, C2fGhost, [ 512 ] ],
    [ -1, 1, GhostConv, [ 1024, 3, 2 ] ],  # 7-P5/32
    [ -1, 1, ECA, [ 1024 ] ],
    [ -1, 3, C2fGhost, [ 1024 ] ],
    [ -1, 1, SPPF, [ 1024, 5 ] ],  # 14
  ]

# YOLOv5s v6.0 head
head:
  [
    #    [ -1, 1, nn.Identity, [ ] ],
    [ -1, 1, DWConv, [ 512, 1, 1 ] ],
    [ -1, 1, nn.Upsample, [ None, 2, 'nearest' ] ],
    [ -1, 1, ECA, [ 512 ] ],
    [ [ -1, 8 ], 1, Concat, [ 1 ] ],  # cat backbone P4
    [ -1, 3, C2fGhost, [ 512, False ] ],  #19

    [ -1, 1, DWConv, [ 256, 1, 1 ] ],
    [ -1, 1, nn.Upsample, [ None, 2, 'nearest' ] ],
    [ -1, 1, ECA, [ 256 ] ],
    [ [ -1, 5 ], 1, Concat, [ 1 ] ],  # cat backbone P3
    [ -1, 3, C2fGhost, [ 256, False ] ],  #  (P3/8-small)

    [ -1, 1, DWConv, [ 256, 3, 2 ] ],
    [ -1, 1, ECA, [ 256 ] ],
    [ [ -1, 18 ], 1, Concat, [ 1 ] ],  # cat head P4
    [ -1, 3, C2fGhost, [ 512, False ] ],  # 22 (P4/16-medium)

    [ -1, 1, DWConv, [ 512, 3, 2 ] ],
    [ -1, 1, ECA, [ 512 ] ],
    [ [ -1, 14 ], 1, Concat, [ 1 ] ],  # cat head P5
    [ -1, 3, C2fGhost, [ 1024, False ] ],  # 25 (P5/32-large)

    [ [ 23, 27, 31 ], 1, Detect, [ nc, ] ],  # Detect(P3, P4, P5)
  ]
